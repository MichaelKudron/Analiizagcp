<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz ABCD</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #182033;
      --muted: #647086;
      --border: #d9e0ea;
      --good: #1a7f37;
      --bad: #b42318;
      --primary: #2457d6;
      --primary-dark: #1d46ad;
      --warn: #8a5a00;
      --shadow: 0 10px 30px rgba(23, 35, 67, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    button,
    input {
      font: inherit;
    }

    .wrap {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: clamp(12px, 3vw, 24px);
    }

    .top {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 32px);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .small {
      color: var(--muted);
      font-size: clamp(13px, 2.4vw, 14px);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: clamp(14px, 3vw, 18px);
      box-shadow: var(--shadow);
      padding: clamp(14px, 3vw, 22px);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: clamp(8px, 2vw, 12px);
      margin-bottom: 16px;
    }

    .stat {
      min-width: 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: clamp(10px, 2.5vw, 12px);
    }

    .stat b {
      display: block;
      font-size: clamp(19px, 4vw, 24px);
      line-height: 1.15;
      margin-top: 2px;
    }

    .bar {
      width: 100%;
      height: 12px;
      background: #e8edf5;
      border-radius: 999px;
      overflow: hidden;
      margin: 12px 0 18px;
    }

    .fill {
      height: 100%;
      width: 0%;
      background: var(--primary);
      transition: width .25s ease;
    }

    .qmeta {
      color: var(--muted);
      margin-bottom: 8px;
      font-size: clamp(13px, 2.5vw, 14px);
    }

    .question {
      font-size: clamp(18px, 3vw, 21px);
      font-weight: 700;
      margin-bottom: 18px;
      overflow-wrap: anywhere;
    }

    .answers {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .answer {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 11px;
      align-items: start;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 13px;
      cursor: pointer;
      background: #fff;
      min-height: 50px;
      touch-action: manipulation;
    }

    .answer:hover {
      border-color: #9fb2d9;
    }

    .answer:has(input:focus-visible),
    button:focus-visible {
      outline: 3px solid rgba(36, 87, 214, 0.28);
      outline-offset: 2px;
    }

    .answer input {
      width: 20px;
      height: 20px;
      margin: 2px 0 0;
      accent-color: var(--primary);
      flex: 0 0 auto;
    }

    .label {
      font-weight: 700;
      margin-right: 6px;
      white-space: nowrap;
    }

    .correct {
      border-color: rgba(26,127,55,.5);
      background: rgba(26,127,55,.08);
    }

    .wrong {
      border-color: rgba(180,35,24,.5);
      background: rgba(180,35,24,.08);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      min-height: 44px;
      font-weight: 700;
      cursor: pointer;
      background: var(--primary);
      color: white;
      touch-action: manipulation;
    }

    button:hover {
      background: var(--primary-dark);
    }

    button.secondary {
      background: #eef2f7;
      color: var(--text);
    }

    button.secondary:hover {
      background: #dfe7f2;
    }

    button.danger {
      background: #fff1f0;
      color: var(--bad);
      border: 1px solid rgba(180,35,24,.25);
    }

    .msg {
      min-height: 28px;
      font-weight: 700;
      margin-top: 12px;
      overflow-wrap: anywhere;
    }

    .msg.good {
      color: var(--good);
    }

    .msg.bad {
      color: var(--bad);
    }

    .msg.warn {
      color: var(--warn);
    }

    .done {
      text-align: center;
      padding: clamp(24px, 6vw, 30px) 10px;
    }

    .done h2 {
      font-size: clamp(22px, 5vw, 28px);
      margin: 0 0 10px;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 820px) {
      .top {
        flex-direction: column;
      }

      .top .actions {
        width: 100%;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      body {
        background: #ffffff;
      }

      .wrap {
        padding: 10px;
      }

      .top {
        margin-bottom: 12px;
      }

      .card,
      .stat {
        box-shadow: none;
      }

      .card {
        border-radius: 14px;
      }

      .stats {
        gap: 8px;
        margin-bottom: 12px;
      }

      .stat {
        border-radius: 12px;
        padding: 10px;
      }

      .answer {
        grid-template-columns: 24px 1fr;
        padding: 12px;
        border-radius: 12px;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr;
        width: 100%;
      }

      .actions button {
        width: 100%;
      }

      #quizArea > .actions {
        position: sticky;
        bottom: 0;
        z-index: 5;
        background: rgba(255, 255, 255, 0.96);
        border-top: 1px solid var(--border);
        padding: 10px 0 0;
        margin: 0 -1px;
      }

      .msg {
        font-size: 15px;
      }
    }

    @media (max-width: 380px) {
      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Quiz ABCD</h1>
        <div class="small">Błędne odpowiedzi wracają do kolejki. Robisz je aż do poprawnej odpowiedzi.</div>
      </div>
      <div class="actions">
        <button class="secondary" id="shuffleBtn" type="button">Wymieszaj kolejkę</button>
        <button class="danger" id="resetBtn" type="button">Reset</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><span class="small">Wszystkie pytania</span><b id="total">0</b></div>
      <div class="stat"><span class="small">Zaliczone</span><b id="mastered">0</b></div>
      <div class="stat"><span class="small">W kolejce</span><b id="queueLeft">0</b></div>
      <div class="stat"><span class="small">Błędy</span><b id="mistakes">0</b></div>
    </div>

    <div class="bar"><div class="fill" id="fill"></div></div>

    <main class="card" id="quizCard">
      <div id="quizArea">
        <div class="qmeta" id="qmeta"></div>
        <div class="question" id="question"></div>
        <div class="answers" id="answers"></div>
        <div class="actions">
          <button id="checkBtn" type="button">Sprawdź</button>
          <button id="nextBtn" type="button" class="secondary hidden">Dalej</button>
        </div>
        <div class="msg" id="msg"></div>
      </div>
      <div class="done hidden" id="done">
        <h2>Gotowe. Wszystkie pytania zaliczone.</h2>
        <p class="small">Kliknij Reset, żeby zacząć od początku.</p>
      </div>
    </main>
  </div>

  <script>
    const QUESTIONS = [{"id": 1, "question": "A data analyst needs a tool for collecting, storing, integrating, and analyzing data. The tool also needs to be operational without a local network infrastructure. What tool should the data analyst use?", "answers": [{"label": "a", "text": "Real-time analytics software suite", "correct": false}, {"label": "b", "text": "On-premises data warehouse", "correct": false}, {"label": "c", "text": "Cloud data warehouse", "correct": true}, {"label": "d", "text": "Artificial intelligence software suite", "correct": false}]}, {"id": 2, "question": "A company is managing large amounts of data scattered across various systems. This presents a challenge for the company. Which solution is most suitable for gathering and integrating all of the company's structured data for analysis and business insights?", "answers": [{"label": "a", "text": "Traditional on-premises data warehouse", "correct": false}, {"label": "b", "text": "Content management system", "correct": false}, {"label": "c", "text": "Cloud data warehouse", "correct": true}, {"label": "d", "text": "Simple database service", "correct": false}]}, {"id": 3, "question": "In a traditional computing model, where is the data typically located?", "answers": [{"label": "a", "text": "On the internet", "correct": false}, {"label": "b", "text": "On-premises", "correct": true}, {"label": "c", "text": "In the cloud", "correct": false}, {"label": "d", "text": "In a remote data center", "correct": false}]}, {"id": 4, "question": "Your organization is planning to scale up its operations and needs a computing model that allows easy and quick scalability. Which computing model would be suitable for your organization?", "answers": [{"label": "a", "text": "Mobile computing", "correct": false}, {"label": "b", "text": "Hybrid computing", "correct": false}, {"label": "c", "text": "Traditional computing", "correct": false}, {"label": "d", "text": "Cloud computing", "correct": true}]}, {"id": 5, "question": "What is the primary function of BigQuery?", "answers": [{"label": "a", "text": "Store and analyze data.", "correct": true}, {"label": "b", "text": "Schedule queries to automatically refresh data.", "correct": false}, {"label": "c", "text": "Migrate data warehouses from other cloud service providers.", "correct": false}, {"label": "d", "text": "Check the query thought process and plan.", "correct": false}]}, {"id": 6, "question": "A company is developing a new app. It needs a platform where their developers can focus solely on building the app without considering underlying infrastructure. Which cloud service model should the company choose?", "answers": [{"label": "a", "text": "Software as a service, or SAAS", "correct": false}, {"label": "b", "text": "Containers as a service, or CAAS", "correct": false}, {"label": "c", "text": "Platform as a service, or PAAS", "correct": true}, {"label": "d", "text": "Infrastructure as a service, or IAAS", "correct": false}]}, {"id": 7, "question": "What type of storage in a cloud computing infrastructure keeps data in a simple, easy-to-understand way through a hierarchy of files in folders?", "answers": [{"label": "a", "text": "File storage", "correct": true}, {"label": "b", "text": "Metadata storage", "correct": false}, {"label": "c", "text": "Object storage", "correct": false}, {"label": "d", "text": "Block storage", "correct": false}]}, {"id": 8, "question": "An organization wants to make sure its data is safe and secure, even during an emergency. Which common use of cloud computing should they consider?", "answers": [{"label": "a", "text": "Large scale data analysis", "correct": false}, {"label": "b", "text": "Managed services", "correct": false}, {"label": "c", "text": "Data storage", "correct": false}, {"label": "d", "text": "Disaster recovery", "correct": true}]}, {"id": 9, "question": "For organizations, what does cloud computing eliminate the need for?", "answers": [{"label": "a", "text": "Organizations no longer need to use computing resources.", "correct": false}, {"label": "b", "text": "Organizations no longer need to use the internet.", "correct": false}, {"label": "c", "text": "Organizations no longer need to find, set up, or manage resources themselves.", "correct": true}, {"label": "d", "text": "Organizations no longer need to pay for the services they use.", "correct": false}]}, {"id": 10, "question": "What is one of the main advantages of accessing data in cloud computing?", "answers": [{"label": "a", "text": "Organizations need to be connected to a specific network to access their data.", "correct": false}, {"label": "b", "text": "Organizations can access and manage data, software, storage, and infrastructure housed on local servers through the organization’s intranet.", "correct": false}, {"label": "c", "text": "Organizations need to be physically present where the hardware and software are installed to access their data.", "correct": false}, {"label": "d", "text": "Organizations can access and manage data, software, storage, and cloud infrastructure from any location at any time through the internet.", "correct": true}]}, {"id": 11, "question": "A company is using BigQuery to store and analyze data from its sensors. The company wants to create a dashboard that shows the current temperature and humidity readings from all of its sensors. Which cloud data warehouse feature would be most helpful for creating this dashboard?", "answers": [{"label": "a", "text": "SQL functions", "correct": false}, {"label": "b", "text": "Data migration", "correct": false}, {"label": "c", "text": "Real-time analytics", "correct": true}, {"label": "d", "text": "Data freshness", "correct": false}]}, {"id": 12, "question": "A photographer wants to store images in the cloud. Along with the photos, they want to keep data like where and when the photo was taken. Which storage type should the photographer choose?", "answers": [{"label": "a", "text": "Block storage", "correct": false}, {"label": "b", "text": "Object storage", "correct": true}, {"label": "c", "text": "File storage", "correct": false}, {"label": "d", "text": "Metadata-only storage", "correct": false}]}, {"id": 13, "question": "A company needs to identify a cloud computing model that charges them only for the resources they use, based on the number of transactions, the storage volume, and the amount of data transferred. What benefit of cloud computing is the company interested in?", "answers": [{"label": "a", "text": "Scalability", "correct": false}, {"label": "b", "text": "Security", "correct": false}, {"label": "c", "text": "Cost-savings", "correct": true}, {"label": "d", "text": "Efficiency", "correct": false}]}, {"id": 14, "question": "What is a disadvantage of traditional computing related to software?", "answers": [{"label": "a", "text": "Software is usually free of charge.", "correct": false}, {"label": "b", "text": "Software is automatically updated.", "correct": false}, {"label": "c", "text": "Software must be purchased for each user, rather than shared.", "correct": true}, {"label": "d", "text": "Software can be accessed from any location.", "correct": false}]}, {"id": 15, "question": "What is one of the advantages of cloud data warehouses when compared to on-premises data warehouses?", "answers": [{"label": "a", "text": "Cloud data warehouses have more uptime services and scalability.", "correct": true}, {"label": "b", "text": "Cloud data warehouses require more uptime.", "correct": false}, {"label": "c", "text": "Cloud data warehouses do not integrate separated data.", "correct": false}, {"label": "d", "text": "Cloud data warehouses do not store data.", "correct": false}]}, {"id": 16, "question": "You want to estimate the cost of a query before running it. Which feature of BigQuery will help you with this estimate?", "answers": [{"label": "a", "text": "Migrating existing data warehouses from other cloud service providers", "correct": false}, {"label": "b", "text": "Integrated SQL interface and machine learning capabilities", "correct": false}, {"label": "c", "text": "Running a dry-run parameter to check the query thought process", "correct": true}, {"label": "d", "text": "Scheduled queries to automatically refresh data", "correct": false}]}, {"id": 17, "question": "You founded a new startup company and have a limited budget. You need computing resources, but do not want to invest in physical hardware. Which cloud feature best suits you?", "answers": [{"label": "a", "text": "Security features over the internet billed at a monthly rate", "correct": false}, {"label": "b", "text": "AI solutions over the internet, billed based on what you use", "correct": false}, {"label": "c", "text": "Computing resources over the internet, billed based on what you use", "correct": true}, {"label": "d", "text": "Cloud-based software over the internet billed at a monthly rate", "correct": false}]}, {"id": 18, "question": "Ryan wants to provide their employees with immediate access to new and upgraded applications, but they do not want to be responsible for the state of network infrastructure or the implementation process. What benefit of cloud computing is Ryan interested in?", "answers": [{"label": "a", "text": "Security", "correct": false}, {"label": "b", "text": "Accessibility", "correct": false}, {"label": "c", "text": "Scalability", "correct": false}, {"label": "d", "text": "Efficiency", "correct": true}]}, {"id": 19, "question": "What does the term “uptime” refer to?", "answers": [{"label": "a", "text": "The amount of time a machine is not operational.", "correct": false}, {"label": "b", "text": "The amount of data not successfully transferred", "correct": false}, {"label": "c", "text": "The amount of time a machine is operational.", "correct": true}, {"label": "d", "text": "The amount of data transferred.", "correct": false}]}, {"id": 20, "question": "A cloud data analyst is working with a large dataset of customer data. They need to identify the customers who have made the most purchases in the past year. Which BigQuery feature would be most helpful for this task?", "answers": [{"label": "a", "text": "Dry-run parameter", "correct": false}, {"label": "b", "text": "Scheduled queries", "correct": false}, {"label": "c", "text": "SQL functions", "correct": true}, {"label": "d", "text": "Data migration", "correct": false}]}, {"id": 21, "question": "Your startup company has limited IT resources and wants to quickly scale its operations without investing in physical hardware and maintenance. Which cloud model would be most suitable for your startup?", "answers": [{"label": "a", "text": "Hybrid cloud", "correct": false}, {"label": "b", "text": "Public cloud", "correct": true}, {"label": "c", "text": "On-premises cloud", "correct": false}, {"label": "d", "text": "Private cloud", "correct": false}]}, {"id": 22, "question": "What is the final phase of the Google Cloud migration path?", "answers": [{"label": "a", "text": "Deploy", "correct": false}, {"label": "b", "text": "Assess", "correct": false}, {"label": "c", "text": "Plan", "correct": false}, {"label": "d", "text": "Optimize", "correct": true}]}, {"id": 23, "question": "What is a public cloud?", "answers": [{"label": "a", "text": "A combination of the public and private models that involves using both the on-premises (traditional) resources as well as the cloud computing resources.", "correct": false}, {"label": "b", "text": "A cloud model that allows users to add a public cloud provider to an existing on-premises computing infrastructure.", "correct": false}, {"label": "c", "text": "A cloud model that dedicates all cloud resources to a single user or organization and grants full access admin permissions to that single entity.", "correct": false}, {"label": "d", "text": "A cloud model that delivers computing, storage, and network resources through the internet and is shared among multiple users and organizations.", "correct": true}]}, {"id": 24, "question": "What does the rehosting migration strategy involve?", "answers": [{"label": "a", "text": "Moving applications to a new cloud-based service platform.", "correct": false}, {"label": "b", "text": "Building all-new applications from scratch and discarding old applications.", "correct": false}, {"label": "c", "text": "Making small changes to the on-premises system once migrated to the cloud.", "correct": false}, {"label": "d", "text": "Moving an entire on-premises system to the cloud without changing anything else about the system.", "correct": true}]}, {"id": 25, "question": "An organization wants to move its applications to a new, cloud-based service platform and needs to train its team members for the new platform experience. Which cloud-migration strategy is most suitable for this organization?", "answers": [{"label": "a", "text": "Replatforming", "correct": false}, {"label": "b", "text": "Rehosting", "correct": false}, {"label": "c", "text": "Refactoring", "correct": false}, {"label": "d", "text": "Repurchasing", "correct": true}]}, {"id": 26, "question": "A small startup company with unpredictable demands and limited budget is searching for a cloud service provider. The company needs a provider that allows them to adjust resources based on their changing needs and only charges for the resources the company uses. Which resource provisioning model should they choose?", "answers": [{"label": "a", "text": "Advanced provisioning", "correct": false}, {"label": "b", "text": "Fixed provisioning", "correct": false}, {"label": "c", "text": "Self-provisioning", "correct": false}, {"label": "d", "text": "Dynamic provisioning", "correct": true}]}, {"id": 27, "question": "Which type of data storage is meant only for backup or archiving purposes?", "answers": [{"label": "a", "text": "Fixed storage", "correct": false}, {"label": "b", "text": "Coldline storage", "correct": false}, {"label": "c", "text": "Archive storage", "correct": true}, {"label": "d", "text": "Permanent storage", "correct": false}]}, {"id": 28, "question": "What is the key difference between ETL and ELT processes?", "answers": [{"label": "a", "text": "ETL transforms the data before loading it into the warehouse, while ELT transforms it after loading.", "correct": true}, {"label": "b", "text": "ETL transforms the data after loading it into the warehouse, while ELT transforms it before loading.", "correct": false}, {"label": "c", "text": "ETL examines the data rather than loading it into the warehouse, while ELT examines the data before loading.", "correct": false}, {"label": "d", "text": "ETL ingests the data after loading it into the warehouse, while ELT ingests the data before loading.", "correct": false}]}, {"id": 29, "question": "You notice that your cloud service operates efficiently without any lag. Which backend component is most likely responsible for this efficiency?", "answers": [{"label": "a", "text": "Security", "correct": false}, {"label": "b", "text": "Runtime Cloud", "correct": true}, {"label": "c", "text": "Storage", "correct": false}, {"label": "d", "text": "Service", "correct": false}]}, {"id": 30, "question": "You want to improve the user experience while reducing cloud expenses for your organization. What is a key benefit of cloud cost optimization that can help you achieve this goal?", "answers": [{"label": "a", "text": "Enhancing cost visibility", "correct": false}, {"label": "b", "text": "Increasing cloud accessibility", "correct": false}, {"label": "c", "text": "Improving performance of applications", "correct": true}, {"label": "d", "text": "Reducing carbon emissions", "correct": false}]}, {"id": 31, "question": "What is rightsizing in cloud cost optimization?", "answers": [{"label": "a", "text": "Adjusting computing resources to increase cloud efficiency", "correct": false}, {"label": "b", "text": "Adjusting computing resources to reduce cost visibility", "correct": false}, {"label": "c", "text": "Adjusting computing resources to decrease carbon emissions", "correct": false}, {"label": "d", "text": "Adjusting computing resources to fit the exact needs of an application or workload", "correct": true}]}, {"id": 32, "question": "What is a key advantage of cloud cost optimization?", "answers": [{"label": "a", "text": "Increasing carbon emissions", "correct": false}, {"label": "b", "text": "Reducing cost visibility", "correct": false}, {"label": "c", "text": "Cutting carbon emissions", "correct": true}, {"label": "d", "text": "Increasing cloud storage", "correct": false}]}, {"id": 33, "question": "What is the role of “service” in cloud architecture?", "answers": [{"label": "a", "text": "To provide all storage solutions", "correct": false}, {"label": "b", "text": "To manage all tasks and resources", "correct": true}, {"label": "c", "text": "To complete specific tasks", "correct": false}, {"label": "d", "text": "To interact with users", "correct": false}]}, {"id": 34, "question": "What is the difference between stream ingestion and batch ingestion?", "answers": [{"label": "a", "text": "Stream ingestion processes data in predefined intervals or larger chunks, while batch ingestion involves real-time continuous processing of data.", "correct": false}, {"label": "b", "text": "Both stream and batch ingestion process data in predefined intervals or larger chunks, but they transform the data in different ways.", "correct": false}, {"label": "c", "text": "Stream ingestion involves real-time continuous processing of data, while batch ingestion processes data in predefined intervals or larger chunks.", "correct": true}, {"label": "d", "text": "Both stream and batch ingestion involve real-time continuous processing of data, but they process different types of data.", "correct": false}]}, {"id": 35, "question": "You need to process a large amount of raw data and change it into a format for easy analysis. This process will affect your company’s storage costs in several ways. Which factors can significantly affect storage costs?", "answers": [{"label": "a", "text": "Slower data processing requires more advanced storage solutions.", "correct": false}, {"label": "b", "text": "Faster data processing requires more advanced storage solutions.", "correct": true}, {"label": "c", "text": "More data processing results in less storage space needed.", "correct": false}, {"label": "d", "text": "More data processing results in cheaper storage solutions.", "correct": false}]}, {"id": 36, "question": "A manufacturing company is facing challenges like unpredictable demand fluctuations and supply chain disruptions. Which benefit of cloud data analytics would be most helpful for this company?", "answers": [{"label": "a", "text": "Improving the consistency of data from the supply chain", "correct": false}, {"label": "b", "text": "Making it easier for customers to describe project requirements", "correct": false}, {"label": "c", "text": "Evaluating customer feedback of the manufacturer’s products", "correct": false}, {"label": "d", "text": "Making sure manufacturers produce exactly what their customers want", "correct": true}]}, {"id": 37, "question": "An organization decides to implement cloud cost optimization. What is the primary goal of cloud cost optimization for the organization?", "answers": [{"label": "a", "text": "To enhance the performance of applications and reduce workload", "correct": false}, {"label": "b", "text": "To decrease carbon emissions and improve infrastructure effectiveness", "correct": false}, {"label": "c", "text": "To enhance workload efficiency and get maximum value from cloud resources", "correct": true}, {"label": "d", "text": "To decrease cloud expenses and increase data effectiveness", "correct": false}]}, {"id": 38, "question": "You are shopping online. You add items to your cart and proceed to checkout. What backend component in cloud architecture enables this experience?", "answers": [{"label": "a", "text": "Runtime cloud", "correct": false}, {"label": "b", "text": "Infrastructure", "corre a safe and control access to the data. Which basic principle should you consider to help you meet this objective?", "answers": [{"label": "a", "text": "Storytelling", "correct": false}, {"label": "b", "text": "Data governance", "correct": true}, {"label": "c", "text": "Digital consumption", "correct": false}, {"label": "d", "text": "Visualization interaction", "correct": false}]}, {"id": 287, "question": "When you design a visualization, what is the main purpose of your design?", "answers": [{"label": "a", "text": "Communicate a specific data story.", "correct": true}, {"label": "b", "text": "Allow each user to interpret their own story.", "correct": false}, {"label": "c", "text": "Use all the visualization tools in a software package.", "correct": false}, {"label": "d", "text": "Add all the information available about the organization.", "correct": false}]}, {"id": 288, "question": "Why is it important to consider the user interface and the user experience in a data visualization? Select two answers.", "answers": [{"label": "a", "text": "To design complicated visualizations", "correct": false}, {"label": "b", "text": "To limit user access to what is on the screen", "correct": false}, {"label": "c", "text": "To ensure that users understand what options are available to them and what insights can be gained from the data", "correct": true}, {"label": "d", "text": "To design effective, powerful visualizations that bring data to life", "correct": true}, {"label": "e", "text": "To apply data governance principles", "correct": false}]}, {"id": 289, "question": "The following chart represents the current score comparison from 4 different high school soccer teams, per period. Which of the following design features should be implemented to improve the chart design? Select two answers. [Alt text: Bar graph. The light blue bar represents the score on period 1, the dark blue bar the scores on period 2. X-axis has teams 1, 2, 3, and 4. Y-axis has numbers 1, 2, 3, and 4.]", "answ estion": "Which suggestion would be the most impactful to ensure both users with a strong data analysis background and those who have less experience can use the visualization effectively?", "answers": [{"label": "a", "text": "Use colors with low contrast to avoid making the visualization distracting.", "correct": false}, {"label": "b", "text": "Present the data without labels or filters to avoid clutter.", "correct": false}, {"label": "c", "text": "Avoid annotating the data or providing interactive elements.", "correct": false}, {"label": "d", "text": "Keep the visualization simple and focus on the key insight.", "correct": true}]}, {"id": 305, "question": "Which of the following visualization types would be most effective to display the top 10 browsers used by website visitors?", "answers": [{"label": "a", "text": "A single-value visualization", "correct": false}, {"label": "b", "text": "A pie chart", "correct": false}, {"label": "c", "text": "A bar chart", "correct": true}, {"label": "d", "text": "A line chart", "correct": false}]}, {"id": 306, "question": "Which of the following best describes one reason it is important for cloud data analysts to define a purpose statement for the visualization before choosing a visualization type?", "answers": [{"label": "a", "text": "A purpose statement primarily defines the intended audience for the visualization.", "correct": false}, {"label": "b", "text": "A purpose statement ensures that the visualization is accessible and easy to use.", "correct": false}, {"label": "c", "text": "A purpose statement ensures the data can be meaningfully represented in the visualization.", "correct": false}, {"label": "d", "text": "A purpose statement aligns the visualization with the stakeholder’s expectations and ensures the key insight is addressed.", "correct": true}]}, {"id": 307, "question": "You are tasked with creating some visualizations for a dashboard. How does understanding what type of data you will use in each visualization hel cific tool the interviewer asked about in the question.", "correct": false}]}, {"id": 440, "question": "An entry level cloud data analyst is answering behavioral questions using the STAR method. They set the context of the problem they encountered. What phase of the STAR method is this?", "answers": [{"label": "a", "text": "Situation", "correct": true}, {"label": "b", "text": "Result", "correct": false}, {"label": "c", "text": "Action", "correct": false}, {"label": "d", "text": "Task", "correct": false}]}, {"id": 441, "question": "The cloud data analytics capstone prepares you to succeed in completing a small project. How can this capstone project prepare you for the interview process?", "answers": [{"label": "a", "text": "It prepares you to anticipate an applicant’s immediate impact on an organization’s workflow demands and data analytics team.", "correct": false}, {"label": "b", "text": "It prepares you to create a sample project to replace any required data project during the interview process.", "correct": false}, {"label": "c", "text": "It prepares you to review an applicant’s fit with an organization’s workplace culture, professional values, and ethical expectations.", "correct": false}, {"label": "d", "text": "It prepares you to anticipate the common interview process practice of assessing job skills by completing a small project.", "correct": true}]}, {"id": 442, "question": "How can a capstone project in a portfolio benefit you as a cloud data analytics job seeker?", "answers": [{"label": "a", "text": "By highlighting your thought process in addressing problems, allowing interviewers to understand your approach", "correct": true}, {"label": "b", "text": "By offering organizations a way to gauge your ability to perform data analysis on demand", "correct": false}, {"label": "c", "text": "By highlighting aspects of your workplace history and professional accomplishments before the interview process begins", "correct": false}, {"label": "d", "text": "By offering data analysis examples to compare with projects being completed by the current data analytics team", "correct": false}]}, {"id": 443, "question": "What stage of the capstone project offers you the opportunity to review an example to get a clear idea of what you will be doing?", "answers": [{"label": "a", "text": "Once the capstone project is completed", "correct": false}, {"label": "b", "text": "After completing the labs", "correct": false}, {"label": "c", "text": "After choosing a project", "correct": false}, {"label": "d", "text": "At the beginning", "correct": true}]}, {"id": 444, "question": "The capstone project includes what you have learned about cloud storage and data management, cloud data processing and analysis, and what other topic?", "answers": [{"label": "a", "text": "Cloud security", "correct": false}, {"label": "b", "text": "Cloud data visualization", "correct": true}, {"label": "c", "text": "Cloud data history", "correct": false}, {"label": "d", "text": "Cloud storage maintenance", "correct": false}]}, {"id": 445, "question": "Which aspect of the Cloud Data Analytics Certificate gave you on-the-job experience with a data challenge?", "answers": [{"label": "a", "text": "Graded quizzes", "correct": false}, {"label": "b", "text": "Interactive activities", "correct": false}, {"label": "c", "text": "Practice quizzes", "correct": false}, {"label": "d", "text": "Capstone project", "correct": true}]}, {"id": 446, "question": "Why is it important to remember your audience when finalizing and adding your capstone project to your portfolio?", "answers": [{"label": "a", "text": "You can reanalyze your capstone project data to consider a specific industry.", "correct": false}, {"label": "b", "text": "You can adapt to what your audience will need to know to understand your work.", "correct": true}, {"label": "c", "text": "You can adjust to the size of your audience during a job interview.", "correct": false}, {"label": "d", "text": "You can adjust your work history based on the audience you are presenting to.", "correct": false}]}, {"id": 447, "question": "Why is it important to focus on process and not just the results when discussing your capstone?", "answers": [{"label": "a", "text": "It allows you to quickly review the capstone project, allowing more time to discuss transferable skills.", "correct": false}, {"label": "b", "text": "It allows an interview team to prepare questions about the results of your project.", "correct": false}, {"label": "c", "text": "It allows members of an interview team direct access to the assets within your portfolio.", "correct": false}, {"label": "d", "text": "It allows you to point to the skills and knowledge you used to complete the project.", "correct": true}]}, {"id": 448, "question": "What is the main purpose of adding a Data Analytics Projects section to your résumé?", "answers": [{"label": "a", "text": "To mention the programming languages you are familiar with, highlighting your coding skills", "correct": false}, {"label": "b", "text": "To detail your previous job responsibilities", "correct": false}, {"label": "c", "text": "To showcase specific projects you have worked on, highlighting your practical experience", "correct": true}, {"label": "d", "text": "To list your educational qualifications", "correct": false}]}, {"id": 449, "question": "What is the primary benefit of adding your capstone project to your portfolio?", "answers": [{"label": "a", "text": "It lists the theoretical knowledge you have gained.", "correct": false}, {"label": "b", "text": "It showcases your hands-on experience with cloud data analytics.", "correct": true}, {"label": "c", "text": "It demonstrates your ability to follow instructions.", "correct": false}, {"label": "d", "text": "It provides a detailed account of your academic background.", "correct": false}]}, {"id": 450, "question": "Why is it important to continuously update your online project portfolio?", "answers": [{"label": "a", "text": "To add more personal information over time", "correct": false}, {"label": "b", "text": "To frequently change the layout for better visibility", "correct": false}, {"label": "c", "text": "To keep it aligned with the latest design trends", "correct": false}, {"label": "d", "text": "To ensure it reflects your most current technical abilities and projects", "correct": true}]}];

    const stateKey = "quiz_abcd_state_v1";
    let state = loadState();

    const el = {
      total: document.getElementById("total"),
      mastered: document.getElementById("mastered"),
      queueLeft: document.getElementById("queueLeft"),
      mistakes: document.getElementById("mistakes"),
      fill: document.getElementById("fill"),
      qmeta: document.getElementById("qmeta"),
      question: document.getElementById("question"),
      answers: document.getElementById("answers"),
      checkBtn: document.getElementById("checkBtn"),
      nextBtn: document.getElementById("nextBtn"),
      msg: document.getElementById("msg"),
      quizArea: document.getElementById("quizArea"),
      done: document.getElementById("done"),
      resetBtn: document.getElementById("resetBtn"),
      shuffleBtn: document.getElementById("shuffleBtn")
    };

    function freshState() {
      return {
        queue: QUESTIONS.map(q => q.id),
        mastered: [],
        mistakes: 0,
        checked: false,
        lastCorrect: null
      };
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(stateKey));
        if (!saved || !Array.isArray(saved.queue) || !Array.isArray(saved.mastered)) return freshState();
        const known = new Set(QUESTIONS.map(q => q.id));
        saved.queue = saved.queue.filter(id => known.has(id));
        saved.mastered = saved.mastered.filter(id => known.has(id));
        for (const q of QUESTIONS) {
          if (!saved.queue.includes(q.id) && !saved.mastered.includes(q.id)) saved.queue.push(q.id);
        }
        saved.checked = false;
        saved.lastCorrect = null;
        saved.mistakes = Number(saved.mistakes || 0);
        return saved;
      } catch {
        return freshState();
      }
    }

    function saveState() {
      localStorage.setItem(stateKey, JSON.stringify(state));
    }

    function getCurrentQuestion() {
      return QUESTIONS.find(q => q.id === state.queue[0]);
    }

    function isMulti(q) {
      return q.answers.filter(a => a.correct).length > 1;
    }

    function selectedLabels() {
      return [...document.querySelectorAll("input[name='answer']:checked")].map(i => i.value).sort();
    }

    function correctLabels(q) {
      return q.answers.filter(a => a.correct).map(a => a.label).sort();
    }

    function sameArray(a, b) {
      return a.length === b.length && a.every((v, i) => v === b[i]);
    }

    function render() {
      el.total.textContent = QUESTIONS.length;
      el.mastered.textContent = state.mastered.length;
      el.queueLeft.textContent = state.queue.length;
      el.mistakes.textContent = state.mistakes;
      el.fill.style.width = Math.round((state.mastered.length / QUESTIONS.length) * 100) + "%";

      if (state.queue.length === 0) {
        el.quizArea.classList.add("hidden");
        el.done.classList.remove("hidden");
        saveState();
        return;
      }

      el.quizArea.classList.remove("hidden");
      el.done.classList.add("hidden");

      const q = getCurrentQuestion();
      const multi = isMulti(q);

      el.qmeta.textContent = `Pytanie ${q.id} z ${QUESTIONS.length}. ${multi ? "Może być kilka poprawnych odpowiedzi." : "Jedna poprawna odpowiedź."}`;
      el.question.textContent = q.question;
      el.answers.innerHTML = "";
      el.msg.textContent = "";
      el.msg.className = "msg";
      el.checkBtn.classList.remove("hidden");
      el.nextBtn.classList.add("hidden");

      q.answers.forEach(a => {
        const lab = document.createElement("label");
        lab.className = "answer";
        lab.dataset.label = a.label;

        const input = document.createElement("input");
        input.type = multi ? "checkbox" : "radio";
        input.name = "answer";
        input.value = a.label;

        const text = document.createElement("div");
        text.innerHTML = `<span class="label">${a.label.toUpperCase()})</span> ${escapeHtml(a.text)}`;

        lab.appendChild(input);
        lab.appendChild(text);
        el.answers.appendChild(lab);
      });

      saveState();
    }

    function checkAnswer() {
      const q = getCurrentQuestion();
      const selected = selectedLabels();
      const correct = correctLabels(q);

      if (selected.length === 0) {
        el.msg.textContent = "Zaznacz odpowiedź.";
        el.msg.className = "msg warn";
        return;
      }

      const ok = sameArray(selected, correct);
      state.checked = true;
      state.lastCorrect = ok;

      document.querySelectorAll(".answer").forEach(row => {
        const label = row.dataset.label;
        const input = row.querySelector("input");
        input.disabled = true;

        if (correct.includes(label)) row.classList.add("correct");
        if (selected.includes(label) && !correct.includes(label)) row.classList.add("wrong");
      });

      if (ok) {
        el.msg.textContent = "Dobrze. Pytanie zaliczone.";
        el.msg.className = "msg good";
      } else {
        state.mistakes += 1;
        el.mistakes.textContent = state.mistakes;
        el.msg.textContent = "Źle. To pytanie wróci na koniec kolejki.";
        el.msg.className = "msg bad";
      }

      el.checkBtn.classList.add("hidden");
      el.nextBtn.classList.remove("hidden");
      saveState();
    }

    function nextQuestion() {
      const current = state.queue.shift();

      if (state.lastCorrect) {
        if (!state.mastered.includes(current)) state.mastered.push(current);
      } else {
        state.queue.push(current);
      }

      state.checked = false;
      state.lastCorrect = null;
      render();
    }

    function shuffleQueue() {
      for (let i = state.queue.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [state.queue[i], state.queue[j]] = [state.queue[j], state.queue[i]];
      }
      render();
    }

    function resetQuiz() {
      if (!confirm("Na pewno zresetować postęp?")) return;
      state = freshState();
      saveState();
      render();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    el.checkBtn.addEventListener("click", checkAnswer);
    el.nextBtn.addEventListener("click", nextQuestion);
    el.resetBtn.addEventListener("click", resetQuiz);
    el.shuffleBtn.addEventListener("click", shuffleQueue);

    document.addEventListener("keydown", (e) => {
      const q = getCurrentQuestion();
      if (!q) return;

      const key = e.key.toLowerCase();
      const labels = q.answers.map(a => a.label);
      if (labels.includes(key) && !state.checked) {
        const input = document.querySelector(`input[value="${key}"]`);
        if (input) {
          if (input.type === "radio") input.checked = true;
          else input.checked = !input.checked;
        }
      }

      if (e.key === "Enter") {
        if (!el.checkBtn.classList.contains("hidden")) checkAnswer();
        else nextQuestion();
      }
    });

    render();
  </script>
